<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kalkulator</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js"></script>
</head>
<body>
  <div id="calculator">
    <div id="display">
      <div class="prev"></div>
      <div class="cur"></div> 
    </div>
  

    <div id="keys">
      <button class="square">√</button>

      <button class="num">7</button>
      <button class="num">8</button>
      <button class="num">9</button>

      <button class="op" id="divide">÷</button>
      <button class="op" id="modulo">%</button>
      <button class="backspace">←</button>

      <button class="num">4</button>
      <button class="num">5</button>
      <button class="num">6</button>

      <button class="op" id="times">*</button>
      <button class="op" id="minus">-</button>
      <button class="clear-all">AC</button>

      <button class="num">1</button>
      <button class="num">2</button>
      <button class="num">3</button>

      <button class="op" id="plus">+</button>
      <button class="equals">=</button>
      <button class="clear-input">C</button>

      <button class="num">0</button>
      <button class="num">00</button>
      <button class="num">.</button>
    </div>
  </div>
</body>
</html>
